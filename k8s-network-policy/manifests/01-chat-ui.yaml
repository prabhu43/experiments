apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-ui
  namespace: ai-platform
  labels:
    app: chat-ui
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-ui
      tier: frontend
  template:
    metadata:
      labels:
        app: chat-ui
        tier: frontend
    spec:
      containers:
        - name: chat-ui
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: chat-ui
  namespace: ai-platform
spec:
  selector:
    app: chat-ui
    tier: frontend
  ports:
    - port: 3000
      targetPort: 80
