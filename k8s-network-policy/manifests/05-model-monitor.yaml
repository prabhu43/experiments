apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-monitor
  namespace: ml-ops
  labels:
    app: model-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-monitor
  template:
    metadata:
      labels:
        app: model-monitor
    spec:
      containers:
        - name: model-monitor
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: model-monitor
  namespace: ml-ops
spec:
  selector:
    app: model-monitor
  ports:
    - port: 80
      targetPort: 80
