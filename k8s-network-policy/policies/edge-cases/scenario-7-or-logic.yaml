# Scenario 7 — OR Logic (Separate Entries)
# Two separate items in the `from` array = OR
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: scenario-7-or-logic
  namespace: edge-cases
  annotations:
    description: "OR logic — podSelector OR namespaceSelector as SEPARATE rules"
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ml-ops
        - podSelector:
            matchLabels:
              app: model-monitor
