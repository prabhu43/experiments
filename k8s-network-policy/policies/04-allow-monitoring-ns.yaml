# Allow all pods in the "ml-ops" namespace to reach any pod in ai-platform
# (demonstrates namespaceSelector for cross-namespace access)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ml-ops-namespace
  namespace: ai-platform
spec:
  podSelector: {}   # applies to all pods in ai-platform namespace
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              purpose: ml-ops
