apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  namespace: ai-platform
  labels:
    app: rag-api
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-api
      tier: backend
  template:
    metadata:
      labels:
        app: rag-api
        tier: backend
    spec:
      containers:
        - name: rag-api
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: rag-api
  namespace: ai-platform
spec:
  selector:
    app: rag-api
    tier: backend
  ports:
    - port: 8000
      targetPort: 80
