# Allow ingress to vector-db ONLY from rag-api pods.
# NOTE: NetworkPolicy "port" must match the pod/container port (80),
#       not the Service ports (6333/6334). kube-proxy DNATs the packet
#       before the policy is evaluated.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rag-api-to-vectordb
  namespace: ai-platform
spec:
  podSelector:
    matchLabels:
      app: vector-db
      tier: db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: rag-api
              tier: backend
      ports:
        - protocol: TCP
          port: 80
