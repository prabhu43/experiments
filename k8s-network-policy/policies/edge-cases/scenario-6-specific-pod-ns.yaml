# Scenario 6 — Allow Only Specific Pod in Specific Namespace (AND logic)
# namespaceSelector AND podSelector in the SAME entry
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: scenario-6-specific-pod-ns
  namespace: edge-cases
  annotations:
    description: "Allow ONLY pods with app=model-monitor in namespace labeled name=ml-ops"
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ml-ops
          podSelector:
            matchLabels:
              app: model-monitor
