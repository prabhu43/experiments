# Allow ingress to rag-api ONLY from chat-ui pods.
# NOTE: NetworkPolicy "port" must match the pod/container port (80),
#       not the Service port (8000). kube-proxy DNATs the packet before
#       the policy is evaluated, so the destination port is already 80.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ui-to-rag-api
  namespace: ai-platform
spec:
  podSelector:
    matchLabels:
      app: rag-api
      tier: backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: chat-ui
              tier: frontend
      ports:
        - protocol: TCP
          port: 80
