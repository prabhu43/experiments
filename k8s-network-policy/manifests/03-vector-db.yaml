apiVersion: apps/v1
kind: Deployment
metadata:
  name: vector-db
  namespace: ai-platform
  labels:
    app: vector-db
    tier: db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vector-db
      tier: db
  template:
    metadata:
      labels:
        app: vector-db
        tier: db
    spec:
      containers:
        - name: vector-db
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: vector-db
  namespace: ai-platform
spec:
  selector:
    app: vector-db
    tier: db
  ports:
    - name: rest
      port: 6333
      targetPort: 80
    - name: grpc
      port: 6334
      targetPort: 80
