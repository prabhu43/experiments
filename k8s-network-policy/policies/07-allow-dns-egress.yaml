# After applying deny-all egress, you must explicitly allow
# egress to kube-dns (CoreDNS) on port 53 (UDP and TCP).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: ai-platform
  annotations:
    description: "Allow egress to kube-dns on port 53 — fixes DNS after deny-all egress"
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
