# Scenario 1 — Allow Everything (Explicit Allow All)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: scenario-1-allow-all
  namespace: edge-cases
  annotations:
    description: "Allow ALL ingress traffic to all pods"
spec:
  podSelector: {}
  ingress:
    - {}
  policyTypes:
    - Ingress
