# Allow ingress from a specific CIDR range (demonstrates ipBlock)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-ip-range
  namespace: ai-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 10.72.0.0/16
            except:
              - 10.72.10.0/24
