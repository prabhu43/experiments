# Scenario 4 — Allow Cluster Internal Traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: scenario-4-cluster-internal
  namespace: edge-cases
  annotations:
    description: "Allow ingress from ALL namespaces inside the cluster"
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
